name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same ref (e.g. new push to a PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: quality
    # Only deploy on pushes to the default branch, never on PRs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    # Serialize Pages deploys; don't cancel a running deploy
    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Warn loudly rather than ship a dead contact form. Without these the app
      # silently falls back to mailto: — it doesn't error, so a missing secret
      # looks exactly like a working deploy until someone tries to message you.
      - name: Check contact-form config
        run: |
          if [ -z "${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}" ] || [ -z "${{ secrets.VITE_TELEGRAM_CHAT_ID }}" ]; then
            echo "::warning title=Contact form::VITE_TELEGRAM_BOT_TOKEN / VITE_TELEGRAM_CHAT_ID not set — the contact form will fall back to mailto: instead of sending to Telegram."
          else
            echo "Telegram delivery configured."
          fi

      - name: Build
        run: npm run build
        # Vite inlines VITE_* at build time, so these must be present here — not
        # at runtime. Note this token is PUBLIC once built: it ends up readable
        # in the JS bundle. Secrets keep it out of the repo and the Actions log,
        # which is worth having, but they cannot make a browser-side bot token
        # private. That trade-off is deliberate; see src/lib/telegram.ts.
        env:
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
